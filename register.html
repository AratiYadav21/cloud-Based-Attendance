<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Attendance System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4a6cf7, #6a11cb);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 370px;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .input-box {
      margin-bottom: 12px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      transition: 0.2s;
    }

    input:focus, select:focus {
      border-color: #4a6cf7;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #4a6cf7;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #3a57d6;
    }

    .footer {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
    }

    .footer a {
      color: #4a6cf7;
      text-decoration: none;
    }

    .message {
      text-align: center;
      font-size: 13px;
      margin-top: 10px;
      color: gray;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Create Account</h2>

    <form>
      <div class="input-box">
        <input type="text" placeholder="Full Name" />
      </div>

      <div class="input-box">
        <input type="email" placeholder="Email Address" />
      </div>

      <div class="input-box">
        <input type="password" placeholder="Password" />
      </div>

      <div class="input-box">
        <input type="password" placeholder="Confirm Password" />
      </div>

      <div class="input-box">
        <select>
          <option>Select Role</option>
          <option>Student</option>
          <option>Teacher</option>
          <option>Admin</option>
        </select>
      </div>

      <button type="button">Register</button>

      <div class="message">
        Fill the form to create account
      </div>
    </form>

    <div class="footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

</body>
</html>
