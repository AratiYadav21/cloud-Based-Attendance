<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Attendance System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4a6cf7, #6a11cb);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 370px;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .input-box {
      margin-bottom: 12px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      transition: 0.2s;
    }

    input:focus, select:focus {
      border-color: #4a6cf7;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #4a6cf7;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #3a57d6;
    }

    .footer {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
    }

    .footer a {
      color: #4a6cf7;
      text-decoration: none;
    }

    .message {
      text-align: center;
      font-size: 13px;
      margin-top: 10px;
      color: gray;
    }
  </style>
</head>
<script>
    document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("registerForm");
    const errorBox = document.getElementById("errorBox");

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const role = document.getElementById("role").value;

        errorBox.innerText = "";

        // 🔥 Password validation (same rule as login)
        const passwordRegex =
        /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;

        if (!passwordRegex.test(password)) {
            errorBox.innerText =
            "Password must be 8+ chars with letter, number & special character";
            return;
        }

        fetch("backend/api/register.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name,
                email,
                password,
                role
            })
        })
        .then(res => res.json())
        .then(data => {

            if (data.status === "success") {
                errorBox.style.color = "green";
                errorBox.innerText = data.message;

                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1500);

            } else {
                errorBox.style.color = "red";
                errorBox.innerText = data.message;
            }

        })
        .catch(() => {
            errorBox.innerText = "Server error";
        });

    });

});
</script>
<body>

  <div class="container">
    <h2>Create Account</h2>

    <form id="registerForm">

<div class="input-group">
<label>Name</label>
<input type="text" id="name" placeholder="Enter Name">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="Enter Email">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter Password">
</div>

<div class="input-group">
<label>Role</label>
<select id="role">
<option value="student">Student</option>
<option value="teacher">Teacher</option>
<option value="admin">Admin</option>
</select>
</div>

<div id="errorBox" style="color:red; margin-bottom:10px;"></div>

<button type="submit">Register</button>

</form>

    <div class="footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

</body>
</html>
